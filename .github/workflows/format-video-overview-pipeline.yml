name: Format Video Overview pipeline

on:
  push:
    branches: [feature/controlled-cinematic-pipeline]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/controlled-cinematic-pipeline
          persist-credentials: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - name: Install pinned developer tools
        run: uv sync --frozen --extra dev
      - name: Apply and commit Ruff output
        run: |
          uv run ruff check --fix --unsafe-fixes scripts/controlled_cinematic_video_overview_pipeline.py
          uv run ruff format scripts/controlled_cinematic_video_overview_pipeline.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/controlled_cinematic_video_overview_pipeline.py
          if ! git diff --cached --quiet; then
            git commit -m "style: format Video Overview pipeline"
            git push origin HEAD:feature/controlled-cinematic-pipeline
          fi
